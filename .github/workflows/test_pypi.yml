name: Test-PyPI

on:
  workflow_dispatch:
    inputs:
      index:
        description: "Target index: pypi or testpypi"
        required: true
        type: choice
        options:
          - pypi
          - testpypi
        default: testpypi

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest']
        # os: ['ubuntu-latest', 'macos-latest']
        # os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        python-version: ['3.13']
        # python-version: ['3.13', '3.14']
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Dependencies
        run: |
          python -m pip install mypy nox

      - name: Install PyPi
        if: ${{ inputs.index == 'pypi' }}
        run: |
          python --version
          python -m pip install funasp

      - name: Install PyPi Test
        if: ${{ inputs.index != 'pypi' }}
        run: |
          python -m pip install --extra-index-url https://test.pypi.org/simple clingo
          python -m pip install colorama types-colorama
          python -m pip install -i https://test.pypi.org/simple/ funasp

      - name: Remove code
        run: |
          rm -rf funasp/**/*

      - name: Test
        run: |
          nox -s slow_test
